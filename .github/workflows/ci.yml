name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install system deps
        run: |
          # Route around the Azure-hosted Ubuntu mirror when it's
          # unhealthy — the ubuntu-latest runner defaults to
          # azure.archive.ubuntu.com, which occasionally times out and
          # burns 20-30 minutes on apt-get retries before falling back
          # to the public archive. Force the public archive upfront, and
          # cap retries/timeout so any remaining mirror hiccups surface
          # fast.
          sudo sed -i 's|http://azure.archive.ubuntu.com|http://archive.ubuntu.com|g' /etc/apt/sources.list /etc/apt/apt-mirrors.txt 2>/dev/null || true
          sudo apt-get update -o Acquire::Retries=2 -o Acquire::http::Timeout=30
          sudo apt-get install -y --no-install-recommends \
              -o Acquire::Retries=2 -o Acquire::http::Timeout=30 \
              libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
              libgdk-pixbuf-2.0-0 libcairo2 libffi-dev shared-mime-info

      - name: Install Python deps
        run: pip install -e ".[api,dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: pytest --tb=short -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Trust-observer invariant gate
        # Closes the `git commit --no-verify` loophole on the local
        # pre-commit hook. Same script, same exit codes — a contributor
        # who skips the local hook still gets blocked at PR time.
        # See scripts/check_trust_observers.sh and frontend/src/lib/
        # trustObserver.js for rule + rationale.
        run: sh scripts/check_trust_observers.sh

      - name: Install & build
        run: |
          cd frontend
          npm ci
          npm run build

  wheel-verify:
    # Phase 9 #40 — rebuild the Pyodide wheel on push and compare against
    # the one committed under frontend/public/. Catches stale-wheel
    # commits that slipped past the pre-commit hook (Phase 9 #39) and
    # smoke-tests the analyzer over the committed synthetic CN fixtures.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install system deps
        run: |
          # Route around the Azure-hosted Ubuntu mirror when it's
          # unhealthy — the ubuntu-latest runner defaults to
          # azure.archive.ubuntu.com, which occasionally times out and
          # burns 20-30 minutes on apt-get retries before falling back
          # to the public archive. Force the public archive upfront, and
          # cap retries/timeout so any remaining mirror hiccups surface
          # fast.
          sudo sed -i 's|http://azure.archive.ubuntu.com|http://archive.ubuntu.com|g' /etc/apt/sources.list /etc/apt/apt-mirrors.txt 2>/dev/null || true
          sudo apt-get update -o Acquire::Retries=2 -o Acquire::http::Timeout=30
          sudo apt-get install -y --no-install-recommends \
              -o Acquire::Retries=2 -o Acquire::http::Timeout=30 \
              libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
              libgdk-pixbuf-2.0-0 libcairo2 libffi-dev shared-mime-info

      - name: Install build deps
        run: pip install wheel build hatchling

      - name: Build fresh wheel
        run: |
          mkdir -p /tmp/wheel-fresh
          pip wheel . --no-deps -w /tmp/wheel-fresh/

      - name: Compare wheel size
        run: |
          FRESH=$(ls /tmp/wheel-fresh/patentlint-*.whl | head -1)
          COMMITTED=frontend/public/patentlint-1.0.0-py3-none-any.whl
          if [ ! -f "$COMMITTED" ]; then
            echo "::error::no committed wheel at $COMMITTED"
            exit 1
          fi
          FRESH_SIZE=$(stat -c %s "$FRESH")
          COMMITTED_SIZE=$(stat -c %s "$COMMITTED")
          DIFF=$((FRESH_SIZE - COMMITTED_SIZE))
          ABS=${DIFF#-}
          PCT=$((ABS * 100 / COMMITTED_SIZE))
          echo "Fresh:     $FRESH_SIZE bytes ($FRESH)"
          echo "Committed: $COMMITTED_SIZE bytes ($COMMITTED)"
          echo "Delta:     $DIFF bytes ($PCT%)"
          if [ "$PCT" -gt 10 ]; then
            echo "::error::wheel size delta >10% — rebuild via 'cd frontend && npm run build:wheel'"
            exit 1
          fi

      - name: Compare wheel file lists
        run: |
          FRESH=$(ls /tmp/wheel-fresh/patentlint-*.whl | head -1)
          COMMITTED=frontend/public/patentlint-1.0.0-py3-none-any.whl
          python - <<PY
          import sys, zipfile
          fresh = sorted(zipfile.ZipFile("$FRESH").namelist())
          committed = sorted(zipfile.ZipFile("$COMMITTED").namelist())
          # Wheel metadata files vary per build — ignore for the file-list check.
          def core(names):
              return [n for n in names if not n.endswith(("RECORD", "METADATA", "WHEEL"))]
          a, b = core(fresh), core(committed)
          if a != b:
              only_fresh = sorted(set(a) - set(b))
              only_committed = sorted(set(b) - set(a))
              print("FAIL: wheel file lists differ")
              if only_fresh:
                  print("  only in fresh:", only_fresh)
              if only_committed:
                  print("  only in committed:", only_committed)
              print("Rebuild via 'cd frontend && npm run build:wheel'")
              sys.exit(1)
          print(f"OK: wheel file lists match ({len(a)} files)")
          PY

      - name: Install patentlint for smoke test
        run: pip install -e "."

      - name: Smoke-test analyzer on synthetic CN fixtures
        run: |
          # Run against the 3 committed synthetic CN fixtures (real CN
          # fixtures are gitignored, not available in CI). Exit 0 means
          # clean; exit 1 means findings (expected here); exit 2+ is a
          # crash we must catch.
          for fixture in tests/fixtures/cn/synthetic/tw_contamination_*.docx; do
              echo "::group::$(basename "$fixture")"
              set +e
              patentlint analyze "$fixture" --jurisdiction cn > /dev/null
              rc=$?
              set -e
              if [ "$rc" -ge 2 ]; then
                  echo "::error::patentlint crashed on $fixture (exit=$rc)"
                  exit 1
              fi
              echo "ok (exit=$rc)"
              echo "::endgroup::"
          done

  docker:
    runs-on: ubuntu-latest
    needs: [test, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: patentlint:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
